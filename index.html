<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>До Эйлата</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            padding: 50px;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        h1 {
            font-size: 3.5em;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 1.5em;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        .countdown {
            font-size: 4.5em;
            font-weight: bold;
            letter-spacing: 5px;
            margin: 30px 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        .info {
            font-size: 1.3em;
            margin-top: 30px;
        }
        .emoji {
            font-size: 4em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="emoji">🧳🌴</div>
    <h1>До поездки в Эйлат</h1>
    <p class="subtitle">10 августа 2026 • 05:00 утра</p>
    
    <div class="countdown" id="countdown">00 дней 00:00:00</div>
    
    <div class="info">
        Осталось совсем немного...<br>
        Готовимся к морю! 🏖️
    </div>

    <script>
        const targetDate = new Date('2026-08-10T05:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById('countdown').innerHTML = 
                    "🎉 ПОРА В ЭЙЛАТ!!! Счастливого отпуска!";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('countdown').innerHTML = 
                `${days} дней ${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // Обновляем каждую секунду
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
