<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>До Эйлата</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2b5c, #1e4a8f);
            color: white;
            text-align: center;
            margin: 0;
            padding: 15px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }
        .emoji {
            font-size: 2.8rem;
            margin-bottom: 8px;
        }
        h1 {
            font-size: 1.85rem;
            margin: 8px 0 6px 0;
        }
        .subtitle {
            font-size: 1.05rem;
            opacity: 0.85;
            margin-bottom: 20px;
        }
        .countdown {
            font-size: 2.45rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 15px 0 20px 0;
            text-shadow: 0 0 12px rgba(255,255,255,0.5);
        }
        .info {
            font-size: 1rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="emoji">🧳🌴</div>
    <h1>До Эйлата</h1>
    <p class="subtitle">10.08 • 05:00</p>
    
    <div class="countdown" id="countdown">Загрузка...</div>
    
    <div class="info">Готовимся к морю 🏖️</div>

    <script>
        const targetDate = new Date('2026-08-10T05:00:00').getTime();

        function updateCountdown() {
            const distance = targetDate - Date.now();

            if (distance < 0) {
                document.getElementById('countdown').innerHTML = "🎉 ПОРА В ЭЙЛАТ!";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('countdown').innerHTML = 
                `${days}д ${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
